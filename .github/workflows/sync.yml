name: Strava sync

# Runs every day at 9am Sydney (AEST, UTC+10 -> 23:00 UTC prev day) and on demand.
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/strava_sync.py

      - name: Commit updated data
        run: |
          git config user.name  "strava-bot"
          git config user.email "actions@github.com"
          git add data/activities.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: strava sync $(date -u +%Y-%m-%d)"
            git push
          fi
